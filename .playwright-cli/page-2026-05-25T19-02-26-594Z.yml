            - text: .
          - paragraph [ref=e115]:
            - text: "A2UI solves the following problem:"
            - strong [ref=e116]: how can AI agents safely send rich UIs across trust boundaries?
          - paragraph [ref=e117]:
            - text: Instead of text-only responses or risky code execution, A2UI lets agents send
            - strong [ref=e118]: declarative component descriptions
            - text: that clients render using their own native widgets. It's like having agents speak a universal UI language.
          - paragraph [ref=e119]: "This repository contains:"
          - list [ref=e120]:
            - listitem [ref=e121]:
              - strong [ref=e122]:
                - link "A2UI specifications" [ref=e123] [cursor=pointer]:
                  - /url: https://a2ui.org/specification/v0.8-a2ui/
              - text: (v0.8 stable, v0.9 draft).
            - listitem [ref=e124]:
              - strong [ref=e125]:
                - text: Implementations for
                - link "renderers" [ref=e126] [cursor=pointer]:
                  - /url: https://a2ui.org/reference/renderers/
              - text: (Angular, Flutter, Lit, Markdown, etc.) on the client side.
            - listitem [ref=e127]:
              - strong [ref=e128]:
                - text: Transports like
                - link "A2A" [ref=e129] [cursor=pointer]:
                  - /url: https://a2ui.org/concepts/transports/
              - text: which communicate A2UI messages between agents and clients.
          - list [ref=e131]:
            - listitem [ref=e132]:
              - paragraph [ref=e133]:
                - img [ref=e135]
                - strong [ref=e137]: Secure by Design
              - separator [ref=e138]
              - paragraph [ref=e139]: Declarative data format, not executable code. Agents can only use pre-approved components from your catalog—no UI injection attacks.
            - listitem [ref=e140]:
              - paragraph [ref=e141]:
                - img [ref=e143]
                - strong [ref=e145]: LLM-Friendly
              - separator [ref=e146]
              - paragraph [ref=e147]: Flat, streaming JSON structure designed for easy generation. LLMs can build UIs incrementally without perfect JSON in one shot.
            - listitem [ref=e148]:
              - paragraph [ref=e149]:
                - img [ref=e151]
                - strong [ref=e153]: Framework-Agnostic
              - separator [ref=e154]
              - paragraph [ref=e155]: One agent response works everywhere. Render the same UI on Angular, Flutter, React, or native mobile with your own styled components.
            - listitem [ref=e156]:
              - paragraph [ref=e157]:
                - img [ref=e159]
                - strong [ref=e161]: Progressive Rendering
              - separator [ref=e162]
              - paragraph [ref=e163]: Stream UI updates as they're generated. Users see the interface building in real-time instead of waiting for complete responses.
