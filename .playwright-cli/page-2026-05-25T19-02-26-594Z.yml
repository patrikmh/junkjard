          - paragraph [ref=e269]: "The typical interaction flow consists of these steps:"
          - list [ref=e270]:
            - listitem [ref=e271]:
              - strong [ref=e272]: User sends a message
              - text: to an AI agent
            - listitem [ref=e273]:
              - strong [ref=e274]: Agent generates A2UI messages
              - text: describing the UI (structure + data)
            - listitem [ref=e275]:
              - strong [ref=e276]: Messages stream
              - text: to the client application
            - listitem [ref=e277]:
              - strong [ref=e278]: Client renders
              - text: using native components (Angular, Flutter, React, etc.)
            - listitem [ref=e279]:
              - strong [ref=e280]: User interacts
              - text: with the UI, sending actions back to the agent
            - listitem [ref=e281]:
