                - text: .
            - heading "Using reasoning models Copy link to using reasoning models" [level=2] [ref=e579]:
              - generic [ref=e580]: Using reasoning models
              - button "Copy link to using reasoning models" [ref=e581] [cursor=pointer]:
                - img [ref=e582]
            - paragraph [ref=e584]: This guidance applies to GPT-5 series models and is worth revisiting whenever teams move workloads onto reasoning models. GPT-5.5 carries forward many capabilities that first appeared in earlier models, but they’re still worth reviewing if you are moving from an earlier GPT-5 model, GPT-4.1, or a reasoning model such as o3.
            - paragraph [ref=e585]: Teams can overlook these features because they sit partly in API configuration and orchestration rather than in the prompt itself. Used together, the Responses API, reasoning controls, verbosity, structured outputs, prompt caching, tool design, hosted tools, and state management help reasoning models deliver their best intelligence, reliability, latency, and cost profile.
            - list [ref=e586]:
              - listitem [ref=e587]:
                - strong [ref=e588]: "Responses API:"
                - text: GPT-5.5 works best in the
                - link "Responses API" [ref=e589] [cursor=pointer]:
                  - /url: /api/docs/guides/migrate-to-responses
                - text: . Use
                - code [ref=e590]: previous_response_id
                - text: for multi-turn state handling. For stateless or Zero Data Retention flows, pass back the relevant returned output items each turn. See
                - link "Passing context from the previous response" [ref=e591] [cursor=pointer]:
                  - /url: /api/docs/guides/conversation-state#passing-context-from-the-previous-response
                - text: for details.
              - listitem [ref=e592]:
                - strong [ref=e593]: "Reasoning effort:"
                - text: Use
                - code [ref=e594]: reasoning.effort
                - text: to choose between
                - code [ref=e595]: low
                - text: ","
                - code [ref=e596]: medium
                - text: ","
                - code [ref=e597]: high
                - text: ", or"
                - code [ref=e598]: xhigh
                - text: . The default is
                - code [ref=e599]: medium
                - text: ", but many workloads will perform well with"
                - code [ref=e600]: low
                - text: . Reserve
                - code [ref=e601]: none
                - text: for use cases where low latency is more important than intelligence. See
                - link "Reasoning Models" [ref=e602] [cursor=pointer]:
                  - /url: /api/docs/guides/reasoning
                - text: for detailed recommendations.
              - listitem [ref=e603]:
                - strong [ref=e604]: "Verbosity:"
                - text: Use
                - code [ref=e605]: text.verbosity
                - text: to control output length. Treat final answer length as separate from reasoning quality; specify word budgets, section counts, table widths, or JSON-only output where needed.
              - listitem [ref=e606]:
                - strong [ref=e607]: "Structured Outputs:"
                - text: Avoid describing the expected output schema in the prompt. Use
                - link "Structured Outputs" [ref=e608] [cursor=pointer]:
                  - /url: /api/docs/guides/structured-outputs
                - text: for automatic validation and increased accuracy.
              - listitem [ref=e609]:
                - strong [ref=e610]: "Prompt caching:"
                - link "Prompt caching" [ref=e611] [cursor=pointer]:
                  - /url: /api/docs/guides/prompt-caching
                - text: works automatically for eligible long prompts and can reduce latency and input-token cost. To maximize cache hits, keep stable content at the beginning of the request. Put dynamic user-specific context near the end. For repeated traffic with common prefixes, use
                - code [ref=e612]: prompt_cache_key
                - text: consistently and track
                - code [ref=e613]: usage.prompt_tokens_details.cached_tokens
                - text: .
              - listitem [ref=e614]:
                - strong [ref=e615]: "Tool calling:"
                - text: "GPT-5.5 supports the same tool-calling patterns as GPT-5.4, including function tools and tool-heavy agent workflows. Put most tool-specific guidance in the tool descriptions themselves: what the tool does, when to use it, required inputs, side effects, retry safety, and common error modes. Add tool-specific context to system instructions only when it applies across tools or materially changes the agent’s operating policy."
              - listitem [ref=e616]:
                - strong [ref=e617]: "Hosted tools and tool search:"
                - text: Prefer
                - link "OpenAI-hosted tools" [ref=e618] [cursor=pointer]:
                  - /url: /api/docs/guides/tools
                - text: where they fit the workflow, such as web search, file search, code interpreter, image generation, and computer use. Hosted tools reduce custom orchestration burden and keep common tool patterns aligned with the Responses API and Agents SDK. Use custom function tools when you need to call your own systems, enforce domain-specific side effects, or expose internal business workflows. For large tool catalogs, consider using
                - link "tool search" [ref=e619] [cursor=pointer]:
                  - /url: /api/docs/guides/tools-tool-search
                - text: to defer tool definitions and load only the relevant subset.
              - listitem [ref=e620]:
                - strong [ref=e621]: "Tool preambles:"
                - text: "Preambles can improve chat UX because the user sees an initial, useful status update before the model generates the final response. They also make tool use easier to follow: the model can state what it’s about to check or do, then continue from that same assistant state after tool results arrive."
              - listitem [ref=e622]:
                - strong [ref=e623]:
                  - code [ref=e624]: phase
                  - text: "handling:"
                - text: If your application manually manages Responses state by passing output items back each turn instead of using
                - code [ref=e625]: previous_response_id
                - text: ", preserve the"
                - code [ref=e626]: phase
                - text: parameter on returned assistant output items and pass it back unchanged. This is especially important when using reasoning effort, preambles, or repeated tool calls. See
                - link "Phase parameter" [ref=e627] [cursor=pointer]:
                  - /url: /api/docs/guides/reasoning#phase-parameter
                - text: .
              - listitem [ref=e628]:
                - strong [ref=e629]: "Compaction:"
                - text: For long-running agents, use
                - link "conversation/state compaction" [ref=e630] [cursor=pointer]:
                  - /url: /api/docs/guides/compaction
                - text: intentionally. Preserve completed actions, active assumptions, IDs, tool outcomes, unresolved blockers, and the next concrete goal.
              - listitem [ref=e631]:
                - strong [ref=e632]: "Agents SDK:"
                - text: For new agentic systems, use the latest
                - link "Agents SDK" [ref=e633] [cursor=pointer]:
                  - /url: /api/docs/guides/agents
                - text: patterns for tool orchestration, tracing, handoffs, and state management rather than rebuilding orchestration from scratch.
              - listitem [ref=e634]:
                - strong [ref=e635]: "Current date:"
                - text: GPT-5.5 is aware of the current date in UTC. You don’t need to add the current date to system instructions. Add explicit date or timezone context only when the application needs a business-specific timezone, policy-effective date, user-local date, or other non-UTC reference point.