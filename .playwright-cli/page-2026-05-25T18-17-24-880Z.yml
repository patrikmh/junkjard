                  - text: for more details on recommended settings.
                - paragraph [ref=e489]: Higher reasoning effort isn’t automatically better. If the task has conflicting instructions, weak stopping criteria, or open-ended tool access, higher effort can lead to overthinking, unnecessary searching, or output quality regressions. Increase effort only when evals show a measurable quality gain.
              - listitem [ref=e490]:
                - paragraph [ref=e491]:
                  - strong [ref=e492]: "Image inputs preserve more visual detail by default:"
                  - text: GPT-5.5 updates the default handling for image inputs to preserve more visual detail and improve computer use performance. When
