          - generic [ref=e429]:
            - heading "Using GPT-5.5" [level=1] [ref=e430]
            - paragraph [ref=e431]: Learn best practices, features, and migration guidance for GPT-5.5 and the GPT-5 model family.
            - button "Copy Page" [ref=e434] [cursor=pointer]:
              - img [ref=e436]
              - generic [ref=e438]: Copy Page
          - article [ref=e439]:
            - heading "Introduction Copy link to introduction" [level=2] [ref=e440]:
              - generic [ref=e441]: Introduction
              - button "Copy link to introduction" [ref=e442] [cursor=pointer]:
                - img [ref=e443]
            - paragraph [ref=e445]: GPT-5.5 raises the baseline for complex production workflows. It’s a strong fit for coding use cases, tool-heavy agents, grounded assistants, long-context retrieval, product-spec-to-plan workflows, and customer-facing workflows where execution quality and response polish are critical.
            - paragraph [ref=e446]:
              - text: To get the most out of GPT-5.5, treat it as a new model family to tune for, not a drop-in replacement for
              - code [ref=e447]: gpt-5.2
              - text: or
              - code [ref=e448]: gpt-5.4
              - text: . Begin migration with a fresh baseline instead of carrying over every instruction from an older prompt stack. Start with the smallest prompt that preserves the product contract, then tune reasoning effort, verbosity, tool descriptions, and output format against representative examples.
            - paragraph [ref=e449]:
              - text: GPT-5.5 supports all API features that were already available with GPT-5.4, including
              - link "prompt caching" [ref=e450] [cursor=pointer]:
                - /url: /api/docs/guides/prompt-caching
              - text: ","
              - link "hosted tools" [ref=e451] [cursor=pointer]:
                - /url: /api/docs/guides/tools#available-tools
              - text: ","
              - link "tool search" [ref=e452] [cursor=pointer]:
                - /url: /api/docs/guides/tools-tool-search
              - text: ","
              - link "compaction" [ref=e453] [cursor=pointer]:
                - /url: /api/docs/guides/compaction
              - text: ", and"
              - code [ref=e454]: phase
              - text: handling for manually replayed assistant items.
            - paragraph [ref=e455]:
              - text: See the
              - link "GPT-5.5 Prompting Guide" [ref=e456] [cursor=pointer]:
                - /url: /api/docs/guides/prompt-guidance?model=gpt-5.5
              - text: for examples of successful prompting patterns.
            - heading "What’s new Copy link to whats new" [level=2] [ref=e457]:
              - generic [ref=e458]: What’s new
              - button "Copy link to whats new" [ref=e459] [cursor=pointer]:
                - img [ref=e460]
            - list [ref=e462]:
              - listitem [ref=e463]:
                - strong [ref=e464]: "More efficient reasoning:"
                - text: GPT-5.5 reaches strong results with fewer reasoning tokens than prior models, even at the same reasoning effort. This is especially useful in complex, tool-heavy, or multi-step workflows where token savings compound.
              - listitem [ref=e465]:
                - strong [ref=e466]: "Stronger task execution with outcome-first prompts:"
                - text: GPT-5.5 is better at working from a clear goal, preserving constraints, and turning product intent into concrete next steps. Describe the expected outcome, success criteria, allowed side effects, evidence rules, and output shape. Avoid step-by-step process guidance unless the exact path matters.
              - listitem [ref=e467]:
                - strong [ref=e468]: "Stronger and more precise tool use:"
                - text: GPT-5.5 is especially useful on large tool surfaces, multi-step service workflows, and long-running agent tasks. It tends to be more precise in tool selection and argument use.
              - listitem [ref=e469]:
                - strong [ref=e470]: "Tone is often more polished, but can be more direct:"
                - text: GPT-5.5 often produces warmer, more readable answers with less prompt scaffolding.
