                  - text: and
                  - link "Keep the right specificity" [ref=e503] [cursor=pointer]:
                    - /url: /api/docs/guides/prompt-guidance?model=gpt-5.5#formatting
                  - text: .
              - listitem [ref=e504]:
                - paragraph [ref=e505]:
                  - strong [ref=e506]: "Default style is more concise and direct:"
                  - text: GPT-5.5 tends to be efficient, direct, and task-oriented by default. This is useful for many production workflows, but customer-facing or conversational experiences may need explicit personality, warmth, rationale, and formatting guidance. Use
                  - code [ref=e507]: text.verbosity
                  - text: "intentionally:"
                  - code [ref=e508]: medium
                  - text: is the default, and
                  - code [ref=e509]: low
                  - text: is often a better starting point for concise responses. See the
                  - link "GPT-5.5 prompting guide" [ref=e510] [cursor=pointer]:
                    - /url: /api/docs/guides/prompt-guidance?model=gpt-5.5
                  - text: .
              - listitem [ref=e511]:
                - paragraph [ref=e512]:
                  - strong [ref=e513]: "Coding workflows need stronger orchestration:"
                  - text: GPT-5.5 is better suited to complex coding tasks that require planning, tool use, codebase navigation, verification, and multi-step execution. For coding agents, be explicit about reuse, subagent delegation, test expectations, acceptance criteria, and when to continue versus ask for help.
