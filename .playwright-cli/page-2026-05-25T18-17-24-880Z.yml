            - list [ref=e569]:
              - listitem [ref=e570]: State the expected outcome and success criteria.
              - listitem [ref=e571]: Reduce or remove detailed step-by-step process guidance. Let GPT-5.5 choose the path unless the product requires that path.
              - listitem [ref=e572]:
                - text: Remove output schema definitions from the prompt where possible. Use
                - link "Structured Outputs" [ref=e573] [cursor=pointer]:
                  - /url: /api/docs/guides/structured-outputs
                - text: instead.
              - listitem [ref=e574]:
                - text: "Optimize your prompt for caching:"
                - link "static parts first, dynamic parts last" [ref=e575] [cursor=pointer]:
                  - /url: /api/docs/guides/prompt-caching
                - text: .
              - listitem [ref=e576]: Drop the current date. The model is already aware of the current UTC date.
              - listitem [ref=e577]:
                - text: Review and optimize your prompts based on the guidance in
