              - listitem [ref=e499]:
                - paragraph [ref=e500]:
                  - strong [ref=e501]: "Improved instruction following:"
                  - text: GPT-5.5 interprets prompts in a literal and thorough manner, enabling specific, descriptive instructions when the product requires them. Define success criteria and stopping rules, especially for long-running, tool-heavy, or evidence-gathering workflows. See
                  - link "Write outcome-first prompts" [ref=e502] [cursor=pointer]:
