            - list [ref=e546]:
              - listitem [ref=e547]:
                - text: Update the model slug to
                - code [ref=e548]: gpt-5.5
                - text: .
              - listitem [ref=e549]: Use the Responses API for any reasoning, tool-calling, or multi-turn use case.
              - listitem [ref=e550]:
                - text: Tune
                - code [ref=e551]: reasoning.effort
                - text: . Use
                - code [ref=e552]: low
                - text: for efficient reasoning,
                - code [ref=e553]: medium
                - text: for a balanced point on the latency/performance curve,
                - code [ref=e554]: high
                - text: for complex agentic tasks that require hard reasoning and where latency matters less, and
                - code [ref=e555]: xhigh
                - text: for the hardest asynchronous agentic tasks or evals that test the bounds of model intelligence. See the
                - link "Reasoning models documentation" [ref=e556] [cursor=pointer]:
                  - /url: /api/docs/guides/reasoning
                - text: .
              - listitem [ref=e557]:
                - text: To configure for more concise responses, set
