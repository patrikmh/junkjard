<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Patrik's Junkyard Résumé</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>/* ─────────────────────────────────────────────────────────────────
   Patrik's Junkyard Resume — cozy storybook watercolor
   ───────────────────────────────────────────────────────────────── */

:root{
  /* Watercolor palette */
  --paper:        #f3e9d6;
  --paper-2:      #ead9b8;
  --ink:          #2d2419;
  --ink-soft:     #4a3a26;
  --cream:        #f6ecd5;
  --sky-1:        #f7e6c8;
  --sky-2:        #f1c8a6;
  --sky-3:        #c9d8d8;
  --hill-far:     #8aa28f;
  --hill-near:    #6b8a5e;
  --water:        #88a8b2;
  --grass:        #88a44d;
  --grass-dark:   #5e7e3a;
  --sand:         #d9b27a;
  --sand-dark:    #b88a52;
  --barn:         #9c3a2c;
  --barn-dark:    #6f2418;
  --trim:         #f6ecd5;
  --rust:         #b56638;
  --steel:        #8d8a82;
  --steel-dark:   #5c5a55;
  --moss:         #4f6a3a;
  --teal:         #4f7e80;

  /* UI tokens */
  --shadow-soft: 0 10px 24px -10px rgba(45, 36, 25, .35);
  --shadow-card: 0 24px 60px -20px rgba(45, 36, 25, .45),
                 0 2px 6px -2px rgba(45, 36, 25, .25);
  --radius: 14px;
}

/* dusk lighting overrides */
.dusk{
  --sky-1: #5e4b69;
  --sky-2: #8b5d6a;
  --sky-3: #4a4663;
  --hill-far: #4f5a66;
  --hill-near: #3d4a3a;
  --water: #4a5a72;
  --grass: #5a6a3a;
  --grass-dark: #3a4824;
  --sand: #9b7a5a;
  --sand-dark: #6e553a;
  --barn: #6f2418;
  --barn-dark: #4a160e;
  --ink: #f3e9d6;
  --ink-soft: #ddd1ba;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;
  background:#1c170f;color:var(--ink);
  font-family:"Newsreader","Lora",Georgia,serif;}
button{font:inherit;color:inherit}

/* Stage: 1280x542 — matches background painting aspect */
#stage-wrap{
  position:fixed;inset:0;overflow:hidden;
  background:#1c170f;
}
#stage{
  position:absolute;left:50%;top:50%;width:1280px;height:542px;
  background:#e9dcc1;
  box-shadow:0 30px 80px -10px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  overflow:hidden;
  transform-origin:center center;
  user-select:none;
}
/* The painting */
#stage-bg{
  position:absolute;inset:0;
  background-image:var(--bg-url);
  background-size:cover;background-position:center;
  z-index:0;
}
#stage-bg.dusk-tint::after{
  /* dusk filter overlay */
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(40,30,80,.25) 0%,rgba(190,90,60,.18) 60%,rgba(40,20,40,.15) 100%);
  mix-blend-mode:multiply;pointer-events:none;
}

/* paper grain overlay */
#stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 .2  0 0 0 0 .15  0 0 0 0 .08  0 0 0 .35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.25'/></svg>");
  mix-blend-mode:multiply;opacity:.55;
}
/* gentle vignette */
#stage::after{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:51;
  background:radial-gradient(ellipse 110% 80% at 50% 55%, transparent 55%, rgba(40,28,12,.35) 100%);
}

/* ── Sky / Landscape ──────────────────────────────────────────── */
.sky{position:absolute;inset:0 0 55% 0;
  background:
    linear-gradient(to bottom,
      var(--sky-1) 0%,
      var(--sky-2) 55%,
      var(--sky-3) 100%);
}
.sun{position:absolute;left:62%;top:14%;width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%, #fff7d6 0%, #fbd98c 60%, transparent 80%);
  filter:blur(1px);opacity:.85;}
.dusk .sun{background:radial-gradient(circle at 40% 40%, #ffcfa6 0%, #d96b54 60%, transparent 80%);opacity:.9}

.cloud{position:absolute;background:#fff8e8;filter:blur(4px);opacity:.55;border-radius:50%}
.dusk .cloud{background:#c9aab8;opacity:.4}

.hills-far{position:absolute;left:-5%;right:-5%;bottom:42%;height:130px;
  background:var(--hill-far);
  border-radius:50% 60% 40% 50% / 100% 80% 100% 90%;
  filter:blur(.3px);opacity:.85;
}
.hills-near{position:absolute;left:-10%;right:-10%;bottom:38%;height:110px;
  background:var(--hill-near);
  border-radius:60% 40% 70% 30% / 100% 100% 90% 90%;
}
.water{position:absolute;left:8%;right:8%;bottom:42%;height:38px;
  background:linear-gradient(to bottom, var(--water), color-mix(in oklab, var(--water), #000 25%));
  border-radius:50%/40%;opacity:.85;
  box-shadow:inset 0 4px 0 rgba(255,255,255,.18);
}

/* Distant trees - clusters of circles */
.tree{position:absolute;width:38px;height:46px;}
.tree::before{content:"";position:absolute;left:50%;bottom:0;width:6px;height:14px;
  background:#3a2618;transform:translateX(-50%);border-radius:2px}
.tree::after{content:"";position:absolute;left:50%;bottom:8px;width:38px;height:38px;
  background:var(--grass-dark);transform:translateX(-50%);
  border-radius:50% 50% 45% 55% / 60% 60% 40% 40%;}

/* ── Ground ───────────────────────────────────────────────────── */
.ground{position:absolute;left:0;right:0;bottom:0;height:55%;
  background:
    radial-gradient(ellipse 80% 60% at 30% 0%, color-mix(in oklab, var(--sand), #fff 8%), transparent 70%),
    linear-gradient(to bottom, var(--sand) 0%, var(--sand-dark) 100%);
}
.ground-shadow{position:absolute;left:30%;right:5%;top:38%;height:22%;
  background:radial-gradient(ellipse 60% 50% at 60% 50%, rgba(45,30,15,.25), transparent 70%);
  pointer-events:none;
}
.grass-tuft{position:absolute;width:22px;height:8px;
  background:radial-gradient(ellipse at 50% 100%, var(--grass-dark), transparent 70%);
  filter:blur(.5px);opacity:.8}

/* ── Barn & path ──────────────────────────────────────────────── */
.barn{position:absolute;left:30px;bottom:330px;width:230px;height:240px;z-index:5;}
.barn-body{position:absolute;left:0;right:0;bottom:0;top:60px;
  background:var(--barn);
  box-shadow:inset 0 -20px 0 var(--barn-dark), inset 8px 0 0 rgba(0,0,0,.12);
}
.barn-roof{position:absolute;left:-12px;right:-12px;top:0;height:80px;
  background:#3a2618;
  clip-path:polygon(0 100%, 50% 0, 100% 100%);
}
.barn-door{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:78px;height:130px;background:var(--barn-dark);
  border-top:6px solid #2a1810;
  border-left:3px solid rgba(0,0,0,.3);border-right:3px solid rgba(0,0,0,.3);
}
.barn-door::before{content:"";position:absolute;right:10px;top:50%;
  width:6px;height:6px;border-radius:50%;background:#d9b27a;}
.barn-window{position:absolute;width:34px;height:34px;background:#3a4a5a;
  border:5px solid var(--trim);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.3);
}
.barn-window.w1{left:24px;top:88px;}
.barn-window.w2{right:24px;top:88px;}
.barn-window::after{content:"";position:absolute;inset:0;
  background:
    linear-gradient(to right, transparent 47%, var(--trim) 47% 53%, transparent 53%),
    linear-gradient(to bottom, transparent 47%, var(--trim) 47% 53%, transparent 53%);
}
.barn-trim-top{position:absolute;left:0;right:0;top:60px;height:6px;background:var(--trim);}

/* ── Character (smaller, near the painted barn) ──────────────── */
.character{position:absolute;left:80px;bottom:60px;width:90px;height:170px;z-index:10;
  cursor:default;transition:transform .3s ease;}
.character:hover{transform:translateY(-2px) rotate(-1deg);}
.char-portrait{position:absolute;left:0;right:0;top:0;width:90px;height:90px;
  border-radius:50%;overflow:hidden;
  background:#444;
  border:4px solid var(--paper);
  box-shadow:0 6px 16px -4px rgba(0,0,0,.4),
             inset 0 0 0 1px rgba(0,0,0,.1);
  object-fit:cover;
}
.char-portrait img{width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(.92) contrast(1.05);}
.char-body{position:absolute;left:50%;top:78px;transform:translateX(-50%);
  width:70px;height:88px;
  background:linear-gradient(to bottom,
    #c94a3a 0 36%,
    #6f2418 36% 38%,
    #3a2c4e 38% 100%);
  border-radius:24px 24px 8px 8px;
  box-shadow:inset 0 -10px 0 rgba(0,0,0,.18),
             inset 0 2px 0 rgba(255,255,255,.2),
             inset -3px 0 0 rgba(0,0,0,.12);
}
.char-body::before{
  content:"";position:absolute;left:12px;top:36%;width:7px;height:22px;
  background:#3a2c4e;border-radius:2px;
  box-shadow:30px 0 0 #3a2c4e;
}
.char-body::after{
  content:"";position:absolute;left:50%;top:62%;transform:translateX(-50%);
  width:30px;height:20px;background:#2a1c3a;border-radius:4px;
}
.char-arm{position:absolute;width:12px;height:42px;
  background:linear-gradient(180deg,#c94a3a 0%,#7a2a20 100%);
  border-radius:6px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);
  top:86px;
}
.char-arm.left{left:4px;transform:rotate(10deg);}
.char-arm.right{right:4px;transform:rotate(-12deg);}
.char-arm::after{
  content:"";position:absolute;bottom:-5px;left:-3px;width:16px;height:12px;
  background:#e8c8a0;border-radius:50%;
  box-shadow:inset -2px -2px 0 rgba(0,0,0,.1);}

.char-speech{position:absolute;left:50%;bottom:100%;margin-bottom:12px;
  background:var(--paper);border:1.5px solid var(--ink);border-radius:14px;
  padding:8px 14px;font-family:"Caveat",cursive;font-size:18px;line-height:1.15;
  color:var(--ink);white-space:nowrap;
  box-shadow:var(--shadow-soft);
  opacity:0;transform:translateX(-50%) translateY(4px) scale(.95);
  transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;}
.char-speech::before,.char-speech::after{
  content:"";position:absolute;left:50%;width:0;height:0;
  border:8px solid transparent;}
.char-speech::before{bottom:-16px;transform:translateX(-50%);border-top-color:var(--ink);}
.char-speech::after{bottom:-14px;transform:translateX(-50%);border-top-color:var(--paper);}
.character.talking .char-speech{
  opacity:1;transform:translateX(-50%) translateY(0) scale(1);
}

/* ── Cat sitting in the wildflowers ──────────────────────────── */
.cat{position:absolute;left:24px;bottom:18px;width:54px;height:54px;z-index:11;
  filter:drop-shadow(0 4px 4px rgba(45,30,15,.45));
  cursor:pointer;}
.cat-body{position:absolute;left:6px;bottom:0;width:42px;height:28px;
  background:linear-gradient(180deg,#2d2419 0%,#1a1410 100%);
  border-radius:50% 50% 18% 18% / 70% 70% 30% 30%;}
.cat-tail{position:absolute;right:-8px;bottom:8px;width:18px;height:7px;
  background:#2d2419;border-radius:4px;transform:rotate(-32deg);transform-origin:left;}
.cat-head{position:absolute;left:0;bottom:18px;width:30px;height:28px;
  background:#2d2419;border-radius:50% 50% 40% 40% / 55% 55% 45% 45%;}
.cat-ear-l,.cat-ear-r{position:absolute;width:0;height:0;top:-4px;
  border-left:5px solid transparent;border-right:5px solid transparent;
  border-bottom:9px solid #2d2419;}
.cat-ear-l{left:2px;transform:rotate(-15deg);}
.cat-ear-r{right:2px;transform:rotate(15deg);}
.cat-eye-l,.cat-eye-r{position:absolute;width:5px;height:6px;border-radius:50%;
  background:#5e7e3a;top:10px;}
.cat-eye-l{left:6px;} .cat-eye-r{right:6px;}
.cat-nose{position:absolute;left:50%;top:17px;transform:translateX(-50%);
  width:0;height:0;
  border-left:3px solid transparent;border-right:3px solid transparent;
  border-top:4px solid #c94a3a;}
@keyframes purr{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
.cat{animation:purr 1.6s ease-in-out infinite;}

/* ── Junk pile ────────────────────────────────────────────────── */
.pile{position:absolute;left:540px;bottom:170px;width:680px;height:480px;z-index:6;}
.pile-mound{position:absolute;left:-20px;right:-40px;bottom:0;height:180px;
  background:radial-gradient(ellipse 60% 70% at 50% 100%, var(--sand-dark) 0%, transparent 70%);
  filter:blur(2px);
}
/* Wooden crate base — gives the pile structure */
.crate{position:absolute;left:60px;right:120px;bottom:0;height:160px;z-index:6;
  background:
    linear-gradient(180deg, #b08858 0%, #8a5e38 100%);
  border-radius:6px 6px 4px 4px;
  box-shadow:inset 0 -10px 0 #6a4628,
             inset 0 4px 0 rgba(255,255,255,.18),
             inset 0 0 0 2px rgba(106,70,40,.6),
             0 10px 18px -8px rgba(0,0,0,.5);
}
.crate::before{
  /* Vertical plank seams (real wood look) */
  content:"";position:absolute;inset:6px;border-radius:4px;
  background:
    linear-gradient(90deg,
      transparent 0 24%, rgba(58,30,18,.45) 24% 25%,
      transparent 25% 49%, rgba(58,30,18,.45) 49% 50%,
      transparent 50% 74%, rgba(58,30,18,.45) 74% 75%,
      transparent 75% 100%);
}
.crate::after{
  /* Side cross-brace */
  content:"";position:absolute;left:6px;right:6px;top:55%;height:8px;
  background:rgba(58,30,18,.55);
  transform:rotate(-2deg);
}
.crate-label{position:absolute;left:50%;top:8px;transform:translateX(-50%) rotate(-2deg);
  background:#f3e9d6;color:#2d2419;
  font-family:"Caveat",cursive;font-size:18px;line-height:1;
  padding:4px 10px;border-radius:2px;
  border:1.5px solid #2d2419;z-index:1;
  box-shadow:2px 2px 0 rgba(0,0,0,.15);
}
/* Tarp draped on back of pile */
.tarp{position:absolute;left:40px;width:240px;bottom:200px;height:90px;z-index:6;
  background:linear-gradient(135deg, var(--moss) 0%, color-mix(in oklab, var(--moss), #000 20%) 100%);
  border-radius:40% 12% 8% 28%;
  transform:rotate(-6deg);
  box-shadow:inset 0 -8px 0 rgba(0,0,0,.2),
             inset 0 4px 0 rgba(255,255,255,.15),
             0 6px 10px -4px rgba(0,0,0,.4);
  opacity:.92;
}
/* Curled wire decoration */
.wire{position:absolute;width:80px;height:30px;
  border:3px solid #1a1a1a;border-bottom:none;border-radius:50% 50% 0 0 / 100% 100% 0 0;
  z-index:7;pointer-events:none;}
.wire.w1{left:300px;bottom:140px;transform:rotate(8deg) scaleX(.7)}
.wire.w2{left:480px;bottom:160px;transform:rotate(-12deg) scaleX(.5);border-color:#c94a3a;}
/* Small bolts / detritus */
.bolt{position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #b8b4a6 0%, #5a564a 80%);
  box-shadow:0 2px 2px rgba(0,0,0,.4);pointer-events:none;z-index:6;}

/* ── Items (draggable) ────────────────────────────────────────── */
.item{position:absolute;cursor:grab;transition:filter .2s ease, transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index:7;filter:drop-shadow(0 8px 10px rgba(45,30,15,.35));
  touch-action:none;}
.item:hover{filter:drop-shadow(0 12px 14px rgba(45,30,15,.45)) brightness(1.04);
  transform:translateY(-4px) rotate(var(--item-rot,0deg));}
.item.dragging{cursor:grabbing;z-index:100;
  filter:drop-shadow(0 24px 26px rgba(0,0,0,.55)) brightness(1.06);
  transition:none;}
.item.examined{filter:drop-shadow(0 8px 10px rgba(45,30,15,.35)) saturate(.6) brightness(.92);
  opacity:.7;}
.item-label{position:absolute;left:50%;top:-26px;transform:translateX(-50%);
  background:var(--paper);color:var(--ink);
  font-family:"Caveat",cursive;font-size:18px;line-height:1;
  padding:4px 10px;border-radius:14px;
  border:1.5px solid var(--ink);white-space:nowrap;
  opacity:0;transition:opacity .2s ease, transform .2s ease;
  transform:translate(-50%, 4px);pointer-events:none;
  box-shadow:var(--shadow-soft);
}
.item:hover .item-label{opacity:1;transform:translate(-50%, 0);}

/* ── Workbench: small wooden tray at bottom-center ────────────── */
.workbench{position:absolute;left:50%;bottom:24px;
  width:480px;height:84px;
  transform:translateX(-50%);
  z-index:30;
  background:
    repeating-linear-gradient(90deg, #8a5a32 0 60px, #7a4a28 60px 62px, #8a5a32 62px 120px),
    #7a4a28;
  border-radius:10px;
  box-shadow:0 12px 30px -10px rgba(0,0,0,.7),
             inset 0 4px 0 rgba(255,255,255,.12),
             inset 0 -6px 0 #5a3618,
             0 0 0 1.5px rgba(45,30,15,.8);
  transition:box-shadow .2s ease, transform .2s ease;
}
.workbench.target{
  box-shadow:0 0 0 4px var(--moss),
             0 12px 30px -10px rgba(0,0,0,.7),
             inset 0 4px 0 rgba(255,255,255,.2);
  transform:translateX(-50%) translateY(-2px);
}
.workbench-label{position:absolute;left:14px;top:-22px;
  font-family:"Caveat",cursive;font-size:18px;color:var(--paper);
  background:var(--ink);padding:2px 12px;border-radius:8px 8px 0 0;
  border:1.5px solid var(--ink);}
.workbench-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:"Caveat",cursive;font-size:20px;color:rgba(246,236,213,.85);
  pointer-events:none;font-style:italic;letter-spacing:.5px;
  transition:opacity .25s ease;text-shadow:0 1px 0 rgba(0,0,0,.4);}
.workbench.target .workbench-hint{opacity:0;}

/* ── HUD ──────────────────────────────────────────────────────── */
.hud{position:absolute;top:20px;left:20px;right:20px;z-index:60;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;}
.hud > *{pointer-events:auto;}

.title{
  font-family:"Caveat",cursive;font-size:38px;line-height:1;
  color:var(--ink);
  background:var(--paper);
  padding:10px 18px 14px;border-radius:16px;
  border:1.5px solid var(--ink);
  box-shadow:var(--shadow-soft), 4px 4px 0 var(--ink-soft);
  transform:rotate(-1.5deg);
}
.title small{display:block;font-family:"Newsreader",serif;
  font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-soft);margin-top:2px;}

.counter{
  display:flex;align-items:center;gap:10px;
  background:var(--paper);padding:10px 14px;border-radius:14px;
  border:1.5px solid var(--ink);
  box-shadow:var(--shadow-soft), 3px 3px 0 var(--ink-soft);
  font-family:"Newsreader",serif;font-weight:600;
  transform:rotate(1.2deg);
}
.counter-pips{display:flex;gap:4px;}
.pip{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--ink);
  background:transparent;transition:background .2s ease, transform .3s ease;}
.pip.on{background:var(--moss);transform:scale(1.1)}
.counter-label{font-family:"Caveat",cursive;font-size:22px;line-height:1;}

/* sound + tweaks toggles */
.icon-btn{
  width:42px;height:42px;border-radius:50%;
  background:var(--paper);border:1.5px solid var(--ink);
  display:grid;place-items:center;cursor:pointer;
  box-shadow:var(--shadow-soft), 2px 2px 0 var(--ink-soft);
  transition:transform .15s ease;
  font-family:"Caveat",cursive;font-size:20px;
  padding:0;line-height:1;
}
.icon-btn:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-soft), 3px 3px 0 var(--ink-soft);}
.icon-btn:active{transform:translate(1px,1px);box-shadow:var(--shadow-soft), 1px 1px 0 var(--ink-soft);}

.toolbar{position:absolute;top:20px;right:20px;display:flex;gap:8px;z-index:61}

/* ── Inspector panel ──────────────────────────────────────────── */
.inspector-backdrop{position:absolute;inset:0;z-index:200;
  background:rgba(20,12,5,.55);opacity:0;pointer-events:none;
  transition:opacity .3s ease;}
.inspector-backdrop.open{opacity:1;pointer-events:auto;}
.inspector{position:absolute;right:0;top:0;bottom:0;width:560px;z-index:201;
  background:var(--paper);
  border-left:1.5px solid var(--ink);
  box-shadow:-20px 0 60px -10px rgba(0,0,0,.4);
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,.0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.inspector.open{transform:translateX(0);}
.insp-head{padding:22px 28px 14px;display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:1.5px dashed rgba(45,36,25,.3);
  background:linear-gradient(to bottom, var(--paper-2), var(--paper));
}
.insp-eyebrow{font-family:"Caveat",cursive;font-size:22px;color:var(--ink-soft);line-height:1}
.insp-title{font-family:"Lora",serif;font-size:34px;font-weight:600;line-height:1.05;
  margin:6px 0 0;color:var(--ink);letter-spacing:-.01em}
.insp-close{appearance:none;background:transparent;border:1.5px solid var(--ink);
  color:var(--ink);width:34px;height:34px;border-radius:50%;cursor:pointer;
  font-family:"Caveat",cursive;font-size:22px;line-height:1;padding:0;
  display:grid;place-items:center;flex-shrink:0;}
.insp-close:hover{background:var(--ink);color:var(--paper);}
.insp-body{flex:1;overflow-y:auto;padding:18px 28px 28px;
  scrollbar-width:thin;scrollbar-color:rgba(45,36,25,.3) transparent;}
.insp-body::-webkit-scrollbar{width:8px}
.insp-body::-webkit-scrollbar-thumb{background:rgba(45,36,25,.3);border-radius:4px}

.exp-block{margin-bottom:22px;padding:0 0 16px;border-bottom:1px dashed rgba(45,36,25,.18);}
.exp-block:last-child{border-bottom:0;}
.exp-role{font-family:"Lora",serif;font-size:20px;font-weight:600;color:var(--ink);margin:0;}
.exp-co{font-family:"Newsreader",serif;font-size:14px;color:var(--ink-soft);margin:2px 0 0;
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.exp-co em{font-style:italic;}
.exp-bullets{margin:10px 0 0;padding:0;list-style:none;}
.exp-bullets li{position:relative;padding:4px 0 4px 22px;font-size:14px;line-height:1.5;
  color:var(--ink);}
.exp-bullets li::before{content:"●";position:absolute;left:6px;top:6px;
  color:var(--moss);font-size:9px;}

.proj-grid{display:grid;gap:10px;}
.proj{padding:12px 14px;background:#fff8e6;border:1.5px solid rgba(45,36,25,.25);
  border-radius:10px;box-shadow:2px 2px 0 var(--ink-soft);}
.proj h4{margin:0 0 4px;font-family:"Lora",serif;font-size:15px;font-weight:600;}
.proj p{margin:0;font-size:13px;line-height:1.5;color:var(--ink-soft);}

.skills-grp{margin-bottom:14px;}
.skills-grp h4{margin:0 0 6px;font-family:"Caveat",cursive;font-size:20px;color:var(--moss);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:3px 10px;background:var(--paper-2);border:1px solid rgba(45,36,25,.3);
  border-radius:999px;font-size:12px;font-family:"Newsreader",serif;}

.contact{display:grid;gap:14px;}
.contact a{color:var(--ink);text-decoration:underline;text-decoration-color:rgba(45,36,25,.4);
  text-underline-offset:3px;}
.contact-row{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:#fff8e6;border:1.5px solid rgba(45,36,25,.25);border-radius:10px;
  box-shadow:2px 2px 0 var(--ink-soft);}
.contact-row b{font-family:"Caveat",cursive;font-size:20px;font-weight:400;color:var(--moss);
  min-width:90px;}

.about-photo{width:120px;height:120px;border-radius:50%;overflow:hidden;
  border:4px solid var(--paper-2);
  box-shadow:var(--shadow-soft);float:right;margin:0 0 12px 16px;}
.about-photo img{width:100%;height:100%;object-fit:cover;}
.about p{font-size:14px;line-height:1.6;margin:0 0 10px;}

.edu-grid{display:grid;gap:10px;}
.edu{padding:12px 14px;border-left:4px solid var(--moss);background:#fff8e6;
  border-radius:0 10px 10px 0;}
.edu h4{margin:0;font-family:"Lora",serif;font-size:15px;font-weight:600;}
.edu p{margin:2px 0 0;font-size:13px;color:var(--ink-soft);}

.hobbies p{font-size:14px;line-height:1.6;}
.hobby-list{margin:10px 0 0;padding:0;list-style:none;display:grid;gap:8px;}
.hobby-list li{padding:10px 14px;background:#fff8e6;border:1.5px solid rgba(45,36,25,.25);
  border-radius:10px;box-shadow:2px 2px 0 var(--ink-soft);font-size:13.5px;line-height:1.5;}
.hobby-list b{font-family:"Caveat",cursive;font-size:20px;color:var(--moss);font-weight:400;
  display:block;line-height:1;margin-bottom:2px;}

/* ── Toast ───────────────────────────────────────────────────── */
.toast{position:absolute;left:50%;top:60px;transform:translateX(-50%) translateY(-20px);
  background:var(--ink);color:var(--paper);
  padding:14px 22px;border-radius:14px;
  font-family:"Caveat",cursive;font-size:24px;
  box-shadow:0 20px 40px -10px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .35s ease, transform .35s ease;
  z-index:300;border:1.5px solid var(--paper);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast small{display:block;font-family:"Newsreader",serif;font-size:12px;font-weight:500;
  text-transform:uppercase;letter-spacing:.1em;opacity:.7;margin-top:2px;}

/* ── easter egg bee ──────────────────────────────────────────── */
@keyframes bee-buzz{
  0%,100%{transform:translate(0,0) rotate(-2deg);}
  25%{transform:translate(8px,-4px) rotate(3deg);}
  50%{transform:translate(-4px,4px) rotate(-4deg);}
  75%{transform:translate(6px,2px) rotate(2deg);}
}
.bee{position:absolute;width:34px;height:24px;cursor:pointer;z-index:9;
  animation:bee-buzz 1.6s ease-in-out infinite;
  filter:drop-shadow(0 4px 4px rgba(0,0,0,.3));
}
.bee-body{position:absolute;left:6px;top:4px;width:22px;height:16px;border-radius:50%;
  background:repeating-linear-gradient(90deg, #1a1a1a 0 5px, #f0c419 5px 9px);}
.bee-wing{position:absolute;width:14px;height:8px;background:rgba(220,230,255,.65);
  border-radius:50%;border:1px solid rgba(60,60,80,.4);top:0;left:10px;
  animation:bee-buzz .15s linear infinite;}

/* ── floating dust particles ──────────────────────────────────── */
@keyframes float-up{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  20%{opacity:.4;}
  100%{transform:translateY(-200px) translateX(40px);opacity:0;}
}
.dust{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;
  animation:float-up 8s linear infinite;opacity:0;pointer-events:none;}

/* ── First-run instruction card ──────────────────────────────── */
.intro{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-1deg);
  z-index:250;
  background:var(--paper);padding:24px 28px;border-radius:18px;
  border:1.5px solid var(--ink);
  box-shadow:var(--shadow-card), 6px 6px 0 var(--ink-soft);
  max-width:440px;text-align:center;
  transition:opacity .4s ease, transform .4s ease;
}
.intro.hidden{opacity:0;transform:translate(-50%,-60%) rotate(-1deg);pointer-events:none;}
.intro h2{font-family:"Caveat",cursive;font-size:42px;line-height:1;margin:0 0 8px;}
.intro p{font-family:"Newsreader",serif;font-size:15px;line-height:1.5;margin:0 0 16px;color:var(--ink-soft);}
.intro button{font-family:"Caveat",cursive;font-size:22px;
  background:var(--ink);color:var(--paper);
  border:0;padding:8px 22px;border-radius:10px;cursor:pointer;
  box-shadow:3px 3px 0 var(--ink-soft);}
.intro button:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink-soft);}

/* ── DECORATIVE PILE ITEMS (non-interactive) ─────────────────── */
.deco{position:absolute;z-index:6;pointer-events:none;
  filter:drop-shadow(0 6px 8px rgba(45,30,15,.32));}

/* Broken keyboard, tipped on its side */
.deco-keyboard{width:160px;height:32px;
  background:linear-gradient(180deg,#3a3a3a 0%,#1a1a1a 100%);
  border-radius:4px;
  box-shadow:inset 0 -3px 0 #0a0a0a, inset 0 2px 0 rgba(255,255,255,.1);
  background-image:
    repeating-linear-gradient(90deg, transparent 0 14px, #5a5a5a 14px 15px, transparent 15px 28px),
    linear-gradient(180deg,#3a3a3a 0%,#1a1a1a 100%);
}
.deco-keyboard::after{content:"";position:absolute;left:50%;top:6px;transform:translateX(-50%);
  width:80%;height:18px;background:
    repeating-linear-gradient(0deg, transparent 0 4px, rgba(255,255,255,.1) 4px 5px, transparent 5px 9px),
    repeating-linear-gradient(90deg, #4a4a4a 0 11px, #2a2a2a 11px 13px);
  border-radius:2px;}

/* Cassette tape */
.deco-cassette{width:90px;height:56px;
  background:linear-gradient(180deg,#c8b48a 0%,#8e7858 100%);
  border:2px solid #2d2419;border-radius:4px;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.2);}
.deco-cassette::before{content:"";position:absolute;inset:8px 8px 16px;
  background:#1a1a1a;border-radius:2px;
  box-shadow:inset 0 0 0 1px #5a5a5a;}
.deco-cassette::after{content:"";position:absolute;left:18px;bottom:18px;
  width:14px;height:14px;border-radius:50%;background:#c8b48a;
  box-shadow:36px 0 0 #c8b48a, 0 0 0 2px #2d2419, 36px 0 0 2px #2d2419;}

/* Headphones */
.deco-headphones{width:90px;height:74px;}
.deco-headphones::before{
  /* band */
  content:"";position:absolute;left:0;right:0;top:0;height:50px;
  border:7px solid #2d2419;border-bottom:none;
  border-radius:50% 50% 0 0;}
.deco-headphones::after{
  /* ear cup */
  content:"";position:absolute;left:-2px;bottom:0;
  width:30px;height:38px;background:radial-gradient(circle at 50% 40%, #5a5a5a 0%, #1a1a1a 80%);
  border-radius:14px;border:3px solid #2d2419;
  box-shadow:62px 0 0 -3px #2d2419, 62px 0 0 0 transparent;}
.deco-headphones .hp2{position:absolute;right:-2px;bottom:0;
  width:30px;height:38px;background:radial-gradient(circle at 50% 40%, #5a5a5a 0%, #1a1a1a 80%);
  border-radius:14px;border:3px solid #2d2419;}

/* Cable spaghetti — a thick squiggly bundle */
.deco-cables{width:140px;height:50px;}
.deco-cables::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 30% at 30% 50%, #c94a3a 0 6px, transparent 7px),
    radial-gradient(ellipse 50% 30% at 70% 60%, #4f7e80 0 6px, transparent 7px),
    radial-gradient(ellipse 60% 30% at 50% 40%, #f0c419 0 6px, transparent 7px),
    radial-gradient(ellipse 60% 30% at 20% 70%, #2d2419 0 6px, transparent 7px);
}
.deco-cables::after{
  /* curls */
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle 22px at 40% 50%, transparent 18px, #c94a3a 18px 22px, transparent 22px),
    radial-gradient(circle 18px at 80% 60%, transparent 14px, #4f7e80 14px 18px, transparent 18px),
    radial-gradient(circle 16px at 20% 30%, transparent 12px, #f0c419 12px 16px, transparent 16px);
}

/* Server rack — vertical tower */
.deco-server{width:60px;height:110px;
  background:linear-gradient(180deg,#5a564a 0%,#3a352a 100%);
  border-radius:4px;
  box-shadow:inset 0 -6px 0 #1a1a1a, inset 0 2px 0 rgba(255,255,255,.15);}
.deco-server::before{content:"";position:absolute;inset:6px;
  background:
    repeating-linear-gradient(0deg, #2d2419 0 8px, #4a4238 8px 10px),
    #2d2419;
  border-radius:2px;}
.deco-server::after{
  /* status LEDs */
  content:"";position:absolute;right:8px;top:14px;
  width:4px;height:4px;border-radius:50%;background:#5e7e3a;
  box-shadow:0 8px 0 #f0c419, 0 16px 0 #c94a3a, 0 0 4px #5e7e3a;}

/* Soldering iron */
.deco-iron{width:100px;height:18px;}
.deco-iron::before{
  /* handle */
  content:"";position:absolute;left:0;top:0;width:48px;height:18px;
  background:linear-gradient(180deg,#c94a3a 0%,#7a2a20 100%);
  border-radius:9px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.3);}
.deco-iron::after{
  /* tip */
  content:"";position:absolute;left:46px;top:6px;width:48px;height:6px;
  background:linear-gradient(90deg,#8a8478 0%,#3a352a 80%,#f0c419 100%);
  border-radius:0 3px 3px 0;
  box-shadow:96px 0 8px rgba(240,196,25,.6);}

/* Small antenna sticking up out of the pile */
.deco-antenna{width:8px;height:90px;
  background:linear-gradient(180deg,#888 0%,#2d2419 100%);
  transform-origin:bottom;}
.deco-antenna::before{
  /* small spiral */
  content:"";position:absolute;left:-4px;top:0;width:16px;height:16px;
  border:3px solid #888;border-radius:50%;
  border-right-color:transparent;border-bottom-color:transparent;}

/* power strip */
.deco-strip{width:120px;height:22px;background:#f0c419;border:2px solid #2d2419;border-radius:4px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);}
.deco-strip::before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;background:#c94a3a;
  box-shadow:0 0 6px #c94a3a;}
.deco-strip::after{content:"";position:absolute;right:6px;left:24px;top:50%;transform:translateY(-50%);
  height:10px;
  background:
    repeating-linear-gradient(90deg, transparent 0 10px, #2d2419 10px 11px, transparent 11px 22px);}

/* ── WORKBENCH TOOLS ─────────────────────────────────────────── */
.wb-tools{position:absolute;left:0;right:0;top:-26px;height:50px;pointer-events:none;z-index:9;}
.wb-tool{position:absolute;}

.wb-lamp{left:60px;bottom:0;width:60px;height:70px;}
.wb-lamp-shade{position:absolute;left:8px;top:0;width:44px;height:28px;
  background:linear-gradient(180deg,#c94a3a 0%,#7a2a20 100%);
  clip-path:polygon(15% 0, 85% 0, 100% 100%, 0 100%);
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));}
.wb-lamp-bulb{position:absolute;left:50%;top:24px;transform:translateX(-50%);
  width:14px;height:14px;border-radius:50%;background:#fff7d6;
  box-shadow:0 0 18px 6px rgba(255,247,214,.5);}
.wb-lamp-neck{position:absolute;left:50%;top:30px;transform:translateX(-50%);
  width:3px;height:38px;background:#3a352a;}
.wb-lamp-base{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:30px;height:8px;background:#3a352a;border-radius:4px;}
.wb-lamp-glow{position:absolute;left:30px;bottom:0;width:200px;height:140px;
  background:radial-gradient(ellipse 60% 50% at 50% 100%, rgba(255,234,180,.35) 0%, transparent 70%);
  pointer-events:none;}
.dusk .wb-lamp-glow{background:radial-gradient(ellipse 60% 50% at 50% 100%, rgba(255,220,140,.5) 0%, transparent 70%);}

.wb-screwdriver{right:180px;bottom:4px;width:90px;height:14px;transform:rotate(-10deg);}
.wb-screwdriver::before{content:"";position:absolute;left:0;top:0;width:46px;height:14px;
  background:linear-gradient(180deg,#f0c419 0%,#a07810 100%);
  border-radius:7px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);}
.wb-screwdriver::after{content:"";position:absolute;left:44px;top:4px;width:48px;height:6px;
  background:linear-gradient(90deg,#a8a8a0 0%,#5a564a 100%);}

.wb-notepad{right:50px;bottom:8px;width:80px;height:60px;
  background:#f6ecd5;border:1.5px solid #2d2419;border-radius:2px;
  transform:rotate(4deg);
  box-shadow:2px 2px 0 rgba(0,0,0,.2);
  background-image:
    repeating-linear-gradient(0deg, transparent 0 10px, rgba(45,36,25,.15) 10px 11px);
}
.wb-notepad::before{content:"";position:absolute;left:8px;top:6px;right:8px;height:8px;
  background:rgba(45,36,25,.55);border-radius:1px;}
.wb-notepad::after{content:"to-do:";position:absolute;left:8px;top:18px;
  font-family:"Caveat",cursive;font-size:14px;color:rgba(45,36,25,.6);}

.wb-coffee{left:140px;bottom:4px;width:34px;height:42px;}
.wb-coffee::before{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,#f3e9d6 0%,#c8b48a 100%);
  border-radius:0 0 6px 6px;
  border:1.5px solid #2d2419;}
.wb-coffee::after{
  /* handle */
  content:"";position:absolute;right:-7px;top:8px;width:10px;height:18px;
  border:2px solid #2d2419;border-left:none;border-radius:0 50% 50% 0;}

/* steam from coffee */
@keyframes steam{0%{opacity:0;transform:translateY(0) scale(.6);}
  20%{opacity:.4;}
  100%{opacity:0;transform:translateY(-30px) scale(1.4);}}
.wb-steam{position:absolute;left:150px;bottom:46px;width:6px;height:14px;border-radius:50%;
  background:#fff;animation:steam 3s ease-in infinite;pointer-events:none;opacity:0;}
.wb-steam.s2{left:160px;animation-delay:1s;animation-duration:2.6s;}
.wb-steam.s3{left:154px;bottom:54px;animation-delay:2s;animation-duration:3.4s;}

/* ── ITEM WOBBLE — subtle idle motion ───────────────────────── */
@keyframes wobble{
  0%,100%{transform:rotate(var(--item-rot,0deg));}
  50%{transform:rotate(calc(var(--item-rot,0deg) + 1.5deg));}
}
.item:not(.dragging):not(:hover){
  animation:wobble var(--wobble-dur,4s) ease-in-out infinite;
  animation-delay:var(--wobble-delay,0s);
}

/* ── WATERCOLOR EDGE FILTER ─────────────────────────────────── */
/* Applied to items + barn for a slight "wet painted" feel */
.watercolor-edge{filter:url(#wc-edge) drop-shadow(0 6px 8px rgba(45,30,15,.32));}

/* ── Improved character body — arms ─────────────────────────── */
.char-arm{position:absolute;width:14px;height:48px;
  background:linear-gradient(180deg,#c94a3a 0%,#7a2a20 100%);
  border-radius:8px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.2);
  top:110px;
}
.char-arm.left{left:18px;transform:rotate(8deg);}
.char-arm.right{right:18px;transform:rotate(-12deg);}
.char-arm::after{
  /* hand */
  content:"";position:absolute;bottom:-6px;left:-2px;width:18px;height:14px;
  background:#e8c8a0;border-radius:50%;
  box-shadow:inset -2px -2px 0 rgba(0,0,0,.1);}

/* ── Cable across pile (thick painted brushstroke) ──────────── */
.power-cable{position:absolute;width:280px;height:6px;background:#2d2419;
  border-radius:6px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
  pointer-events:none;z-index:7;}
.power-cable.c1{left:90px;bottom:140px;transform:rotate(-6deg);
  border-radius:0 6px 6px 0;width:260px;}
.power-cable.c1::before{content:"";position:absolute;left:-8px;top:-4px;
  width:18px;height:14px;background:#5a564a;border-radius:2px;
  box-shadow:inset 0 0 0 1px #2d2419;}
.power-cable.c2{left:280px;bottom:80px;transform:rotate(12deg);width:240px;}

/* ── Birds in distant sky ───────────────────────────────────── */
@keyframes fly{
  0%{transform:translateX(0) translateY(0);}
  50%{transform:translateX(-40px) translateY(-12px);}
  100%{transform:translateX(-80px) translateY(0);}
}
.bird{position:absolute;width:14px;height:6px;color:#2d2419;
  animation:fly 18s linear infinite;}
.bird::before,.bird::after{content:"";position:absolute;top:0;width:7px;height:3px;
  border-top:2px solid currentColor;border-radius:50%;}
.bird::before{left:0;transform:rotate(-20deg);}
.bird::after{right:0;transform:rotate(20deg);}
.dusk .bird{color:#1a1a2a;}

/* ── Satellite dish: big background element behind the pile ── */
.dish{position:absolute;left:480px;bottom:540px;width:160px;height:170px;z-index:5;
  filter:drop-shadow(0 8px 14px rgba(45,30,15,.45));
  transform:rotate(-12deg);
}
.dish-pole{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:6px;height:80px;background:linear-gradient(180deg,#8a8478 0%,#3a352a 100%);}
.dish-bowl{position:absolute;left:0;top:0;width:160px;height:120px;
  background:radial-gradient(ellipse 50% 90% at 50% 50%, #f3e9d6 0%, #c9bd9a 60%, #8a8266 100%);
  border-radius:50% 50% 45% 45% / 60% 60% 40% 40%;
  box-shadow:inset 0 -8px 16px rgba(0,0,0,.25),
             inset 0 6px 8px rgba(255,255,255,.4),
             inset 0 0 0 2px #6e6852;}
.dish-bowl::after{
  /* central LNB */
  content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:14px;height:30px;background:#3a352a;border-radius:6px;
  box-shadow:0 -16px 0 -2px #2d2419, 0 4px 0 0 #2d2419;}
.dish-stripes{position:absolute;inset:8px;border-radius:inherit;opacity:.25;
  background:repeating-linear-gradient(90deg, transparent 0 22px, #6e6852 22px 23px, transparent 23px 44px);}
.plant-flower{position:absolute;left:50%;top:-6px;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;background:#f0c419;
  box-shadow:inset -2px -2px 0 rgba(0,0,0,.2);}
.plant-flower.r{background:#c94a3a;}
.plant-flower.b{background:#a88ec8;}

/* ── Improved speech bubble: above character ────────────── */
.char-speech{
  left:50%;top:auto;bottom:100%;margin-bottom:12px;
  transform:translateX(-50%) translateY(4px) scale(.95);
}
.char-speech::before,.char-speech::after{
  /* triangle pointing DOWN from bubble */
  left:50%;top:auto;bottom:-16px;transform:translateX(-50%);
  border-color:transparent;
}
.char-speech::before{border-top-color:var(--ink);}
.char-speech::after{bottom:-14px;border-top-color:var(--paper);}
.character.talking .char-speech{
  transform:translateX(-50%) translateY(0) scale(1);
}

/* fonts */
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400..700;1,400..700&family=Newsreader:ital,wght@0,300..700;1,300..700&display=swap');

/* ════════════════════════════════════════════════════════════════
   MOBILE ADAPTATIONS
   ════════════════════════════════════════════════════════════════ */

/* ── Small-screen portrait: scaled scene with scrolling ─────── */
@media (max-width: 768px) and (orientation: portrait){

    position:relative;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    width:100vw;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:12px 0 40px;

  #stage{
    position:relative;
    left:auto;top:auto;
    transform:scale(0.35) !important;
    transform-origin:top center !important;
    margin:0;
    flex-shrink:0;
  }
  #stage-bg{
    position:absolute;
    inset:0;
    height:100%;
  }
}

/* ── Landscape phones / small tablets ─────────────────────────── */

    transform:translate(-50%,-50%) scale(0.55) !important;
  }
}

    transform:translate(-50%,-50%) scale(0.75) !important;
  }
}

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>// audio.js — procedural Web Audio for the junkyard scene.
// All sounds synthesized from oscillators + envelopes. No external files.

(function(){
  let ctx = null;
  let masterGain = null;
  let ambientNodes = null;
  let volume = 0.7;
  let muted = false;

  function ensure(){
    if(ctx) return ctx;
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    ctx = new AC();
    masterGain = ctx.createGain();
    masterGain.gain.value = muted ? 0 : volume;
    masterGain.connect(ctx.destination);
    return ctx;
  }

  function resume(){
    const c = ensure();
    if(c && c.state === 'suspended') c.resume();
  }

  function blip(freq, dur, type='sine', vol=0.25, attack=0.005, release=null){
    const c = ensure(); if(!c) return;
    const t0 = c.currentTime;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function noiseBuf(dur){
    const c = ensure(); if(!c) return null;
    const n = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const ch = buf.getChannelData(0);
    for(let i=0;i<n;i++) ch[i] = (Math.random()*2-1) * (1 - i/n);
    return buf;
  }

  // ── Public SFX ────────────────────────────────────────────
  const SFX = {
    hover(){
      blip(900, 0.07, 'sine', 0.08);
    },
    pickup(){
      // ascending blip
      blip(440, 0.08, 'triangle', 0.15);
      setTimeout(()=>blip(660, 0.08, 'triangle', 0.12), 50);
    },
    drop(){
      // wood clunk: short noise + low sine
      const c = ensure(); if(!c) return;
      const t0 = c.currentTime;
      const src = c.createBufferSource();
      const filter = c.createBiquadFilter();
      const g = c.createGain();
      src.buffer = noiseBuf(0.12);
      filter.type = 'lowpass';
      filter.frequency.value = 600;
      g.gain.setValueAtTime(0.3, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
      src.connect(filter).connect(g).connect(masterGain);
      src.start(t0);
      // thud body
      blip(110, 0.18, 'sine', 0.35, 0.002);
      blip(72, 0.22, 'sine', 0.18, 0.002);
    },
    clink(){
      // metal tink: 2-3 high partials, fast decay
      blip(2400, 0.18, 'triangle', 0.06, 0.001);
      setTimeout(()=>blip(3200, 0.14, 'sine', 0.04), 10);
      setTimeout(()=>blip(1700, 0.22, 'triangle', 0.05), 20);
    },
    open(){
      // ascending arpeggio
      const notes = [392, 523, 659, 784];
      notes.forEach((f,i)=>setTimeout(()=>blip(f, 0.22, 'triangle', 0.16), i*55));
    },
    close(){
      blip(660, 0.08, 'triangle', 0.1);
      setTimeout(()=>blip(440, 0.1, 'triangle', 0.08), 50);
    },
    achievement(){
      // triumphant arpeggio
      const notes = [523, 659, 784, 1047, 1319];
      notes.forEach((f,i)=>setTimeout(()=>{
        blip(f, 0.3, 'triangle', 0.18);
        blip(f*2, 0.3, 'sine', 0.06);
      }, i*80));
    },
    buzz(){
      // bee buzz: short rough tone
      const c = ensure(); if(!c) return;
      const t0 = c.currentTime;
      const osc = c.createOscillator();
      const g = c.createGain();
      const lfo = c.createOscillator();
      const lfoG = c.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 220;
      lfo.frequency.value = 28;
      lfoG.gain.value = 40;
      lfo.connect(lfoG).connect(osc.frequency);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.12, t0 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
      osc.connect(g).connect(masterGain);
      osc.start(t0); lfo.start(t0);
      osc.stop(t0 + 0.42); lfo.stop(t0 + 0.42);
    },
    error(){
      blip(220, 0.18, 'square', 0.08);
    }
  };

  // ── Ambient loop: wind + occasional bird ──────────────────
  function startAmbient(){
    const c = ensure(); if(!c) return;
    if(ambientNodes) return;

    // pink-ish noise wind
    const src = c.createBufferSource();
    const n = Math.floor(c.sampleRate * 4);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const ch = buf.getChannelData(0);
    let b0=0,b1=0,b2=0;
    for(let i=0;i<n;i++){
      const w = Math.random()*2-1;
      b0 = 0.99*b0 + w*0.05; b1 = 0.96*b1 + w*0.04; b2 = 0.86*b2 + w*0.03;
      ch[i] = (b0+b1+b2) * 0.45;
    }
    src.buffer = buf; src.loop = true;

    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 380;

    const lfo = c.createOscillator();
    const lfoG = c.createGain();
    lfo.frequency.value = 0.08;
    lfoG.gain.value = 120;
    lfo.connect(lfoG).connect(filter.frequency);

    const g = c.createGain();
    g.gain.value = 0.18;
    src.connect(filter).connect(g).connect(masterGain);
    src.start();
    lfo.start();

    // birds: random chirps every 6-14s
    const birdTimer = setInterval(()=>{
      if(muted) return;
      const base = 1400 + Math.random()*1200;
      const c2 = ensure(); if(!c2) return;
      const t0 = c2.currentTime;
      const osc = c2.createOscillator();
      const og = c2.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(base, t0);
      osc.frequency.exponentialRampToValueAtTime(base*1.5, t0+0.06);
      osc.frequency.exponentialRampToValueAtTime(base*0.9, t0+0.14);
      og.gain.setValueAtTime(0, t0);
      og.gain.linearRampToValueAtTime(0.06, t0+0.02);
      og.gain.exponentialRampToValueAtTime(0.0001, t0+0.16);
      osc.connect(og).connect(masterGain);
      osc.start(t0); osc.stop(t0+0.18);
      // second chirp
      setTimeout(()=>{
        const tt = c2.currentTime;
        const o2 = c2.createOscillator(); const g2 = c2.createGain();
        o2.type = 'sine'; o2.frequency.setValueAtTime(base*1.1, tt);
        o2.frequency.exponentialRampToValueAtTime(base*0.85, tt+0.12);
        g2.gain.setValueAtTime(0, tt);
        g2.gain.linearRampToValueAtTime(0.05, tt+0.02);
        g2.gain.exponentialRampToValueAtTime(0.0001, tt+0.14);
        o2.connect(g2).connect(masterGain);
        o2.start(tt); o2.stop(tt+0.16);
      }, 180);
    }, 6000 + Math.random()*8000);

    ambientNodes = { src, lfo, birdTimer };
  }
  function stopAmbient(){
    if(!ambientNodes) return;
    try{ ambientNodes.src.stop(); }catch(e){}
    try{ ambientNodes.lfo.stop(); }catch(e){}
    clearInterval(ambientNodes.birdTimer);
    ambientNodes = null;
  }

  // ── Controls ──────────────────────────────────────────────
  function setVolume(v){
    volume = v;
    if(masterGain) masterGain.gain.value = muted ? 0 : v;
  }
  function setMuted(m){
    muted = m;
    if(masterGain) masterGain.gain.value = m ? 0 : volume;
    if(m) stopAmbient();
  }

  window.JunkAudio = {
    resume, SFX, startAmbient, stopAmbient, setVolume, setMuted,
    get muted(){ return muted; },
    get volume(){ return volume; }
  };
})();
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

}

function Dust(){
  const motes = Array.from({ length: 14 }, (_, i) => i);
  return motes.map(i => (
    <div key={i} className="dust" style={{
      left: `${10 + Math.random()*80}%`,
      bottom: `${20 + Math.random()*40}%`,
      animationDelay: `${Math.random()*8}s`,
      animationDuration: `${6 + Math.random()*6}s`,
    }} />
  ));
}

/* ── Draggable Item ───────────────────────────────────────────── */

function DraggableItem({ section, layout, examined, stageRef, wobbleSeed = 0, onPick, onDrop, onClick, onHover }){
  const ref = useRef(null);
  const [pos, setPos] = useState(null);   // {x, y} in STAGE-LOCAL coords during drag
  const [dragging, setDragging] = useState(false);
  const offset = useRef({ x: 0, y: 0 });  // pointer offset from item top-left, in stage-local
  const startViewport = useRef({ x: 0, y: 0 });
  const moved = useRef(false);
  const Art = ItemArt[section.kind];

  // Viewport -> stage-local
  const toStage = (vx, vy) => {
    const stage = stageRef && stageRef.current;
    if(!stage) return { x: vx, y: vy };
    const r = stage.getBoundingClientRect();
    const sx = r.width / 1280;   // stage native is 1280 wide
    return { x: (vx - r.left) / sx, y: (vy - r.top) / sx };
  };

  const onPointerDown = (e) => {
    if(examined) return;
    e.preventDefault();
    const rect = ref.current.getBoundingClientRect();
    const ptStage = toStage(e.clientX, e.clientY);
    const itemTopLeftStage = toStage(rect.left, rect.top);
    offset.current = {
      x: ptStage.x - itemTopLeftStage.x,
      y: ptStage.y - itemTopLeftStage.y
    };
    startViewport.current = { x: e.clientX, y: e.clientY };
    moved.current = false;
    setPos({ x: ptStage.x - offset.current.x, y: ptStage.y - offset.current.y });
    setDragging(true);
    ref.current.setPointerCapture(e.pointerId);
    onPick(section.key);
  };
  const onPointerMove = (e) => {
    if(!dragging) return;
    const dx = e.clientX - startViewport.current.x;
    const dy = e.clientY - startViewport.current.y;
    if(Math.abs(dx) + Math.abs(dy) > 4) moved.current = true;
    const ptStage = toStage(e.clientX, e.clientY);
    setPos({ x: ptStage.x - offset.current.x, y: ptStage.y - offset.current.y });
  };
  const onPointerUp = (e) => {
    if(!dragging) return;
    setDragging(false);
    if(!moved.current){
      onClick(section.key);
    } else {
      onDrop(section.key, e.clientX, e.clientY);
    }
    setPos(null);
    try { ref.current.releasePointerCapture(e.pointerId); } catch(_){}
  };

  // Resting position from layout (absolute on stage)
  const restingStyle = {
    left: layout.x, top: layout.y,
    transform: `rotate(${layout.rot}deg)`,
    '--item-rot': `${layout.rot}deg`,
    '--wobble-dur': `${3.6 + (wobbleSeed % 4) * 0.6}s`,
    '--wobble-delay': `${(wobbleSeed % 5) * 0.3}s`
  };
  // Dragging style — absolute inside stage, stage-local coords
  const dragStyle = pos ? {
    left: pos.x, top: pos.y,
    transform: 'rotate(-2deg) scale(1.08)',
    transformOrigin: 'center center',
    zIndex: 1000
  } : null;

  return (
    <div
      ref={ref}
      className={`item${dragging ? ' dragging' : ''}${examined ? ' examined' : ''}`}
      style={dragStyle || restingStyle}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
      onMouseEnter={() => onHover(section.key)}
    >
      <Art />
      <div className="item-label">{section.label}</div>
    </div>
  );
}

/* ── Bee easter egg ───────────────────────────────────────────── */

function Bee({ x, y, found, onCatch }){
  if(found) return null;
  return (
    <div className="bee" style={{ left: x, top: y }} onClick={onCatch}>
      <div className="bee-body" />
      <div className="bee-wing" />
    </div>
  );
}

/* ── Inspector overlay ────────────────────────────────────────── */

function Inspector({ section, onClose }){
  const open = !!section;
  const Body = section ? INSPECTORS[section.key] : null;
  return (
    <>
      <div className={`inspector-backdrop${open ? ' open' : ''}`} onClick={onClose} />
      <div className={`inspector${open ? ' open' : ''}`}>
        {section && (
          <>
            <div className="insp-head">
              <div>
                <div className="insp-eyebrow">{section.eyebrow}</div>
                <h2 className="insp-title">{section.title}</h2>
                <div style={{ fontFamily: 'Caveat, cursive', fontSize: 18,
                  color: '#5e7e3a', marginTop: 4 }}>{section.quip}</div>
              </div>
              <button className="insp-close" onClick={onClose} aria-label="Close">✕</button>
            </div>
            <div className="insp-body">
              {Body && <Body />}
            </div>
          </>
        )}
      </div>
    </>
  );
}

/* ── Toast ────────────────────────────────────────────────────── */

function Toast({ message, sub, show }){
  return (
    <div className={`toast${show ? ' show' : ''}`}>
      {message}
      {sub && <small>{sub}</small>}
    </div>
  );
}

/* ── Stage scaler ─────────────────────────────────────────────── */

function useStageScale(){
  const [scale, setScale] = useState(1);
  useEffect(()=>{
    const update = () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const sx = w / 1280;
      const sy = h / 542;
      const isPortrait = w < h && w <= 768;
      if (isPortrait) {
        setScale(1);
      } else {
        setScale(Math.min(sx, sy, 1.4));
      }
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);
  return scale;
}

/* ── Main App ─────────────────────────────────────────────────── */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "classic",
  "lighting": "day",
  "volume": 70,
  "muted": false
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const scale = useStageScale();
  const stageRef = useRef(null);
  const workbenchRef = useRef(null);

  const [intro, setIntro] = useState(true);
  const [activeSection, setActiveSection] = useState(null);
  const [examined, setExamined] = useState(new Set());
  const [hoveredKey, setHoveredKey] = useState(null);
  const [parallax, setParallax] = useState({ x: 0, y: 0 });
  const [toast, setToast] = useState(null);
  const [characterTalking, setCharacterTalking] = useState(true);
  const [beeFound, setBeeFound] = useState(false);
  const [wbTarget, setWbTarget] = useState(false);

  const layout = LAYOUTS[t.layout] || LAYOUTS.classic;
  const sectionList = ['about','work','projects','skills','education','contact','hobbies'];

  // audio init + ambient
  useEffect(()=>{
    JunkAudio.setVolume((t.volume ?? 70) / 100);
    JunkAudio.setMuted(!!t.muted);
  }, [t.volume, t.muted]);

  const startAudio = useCallback(()=>{
    JunkAudio.resume();
    if(!t.muted) JunkAudio.startAmbient();
  }, [t.muted]);

  // parallax
  useEffect(()=>{
    const onMove = (e) => {
      const cx = window.innerWidth/2;
      const cy = window.innerHeight/2;
      setParallax({
        x: (e.clientX - cx) / cx,
        y: (e.clientY - cy) / cy
      });
    };
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, []);

  // achievement
  useEffect(()=>{
    if(examined.size === sectionList.length){
      setToast({ msg: "All parts examined!", sub: "Now go hire the man" });
      JunkAudio.SFX.achievement();
      const id = setTimeout(()=> setToast(null), 4200);
      return () => clearTimeout(id);
    }
  }, [examined]);

  // hide intro after 9s automatically
  useEffect(()=>{
    if(!intro) return;
    const id = setTimeout(()=> setIntro(false), 9000);
    return () => clearTimeout(id);
  }, [intro]);

  // character speech ON first 6 seconds after intro dismiss
  useEffect(()=>{
    if(intro) return;
    setCharacterTalking(true);
    const id = setTimeout(()=> setCharacterTalking(false), 5500);
    return () => clearTimeout(id);
  }, [intro]);

  const handleHover = (key) => {
    if(hoveredKey === key) return;
    setHoveredKey(key);
    JunkAudio.SFX.hover();
  };
  const handlePick = (key) => {
    JunkAudio.SFX.pickup();
  };
  const openSection = (key) => {
    const sec = SECTIONS[key];
    if(!sec) return;
    setActiveSection(sec);
    setExamined(prev => new Set(prev).add(key));
    JunkAudio.SFX.open();
  };
  const closeSection = () => {
    setActiveSection(null);
    JunkAudio.SFX.close();
  };

  // Detect drop on workbench (page coords)
  const handleDrop = (key, x, y) => {
    const wb = workbenchRef.current;
    if(!wb){ JunkAudio.SFX.drop(); return; }
    const r = wb.getBoundingClientRect();
    const hit = x >= r.left && x <= r.right && y >= r.top && y <= r.bottom + 30;
    JunkAudio.SFX.drop();
    if(hit){
      // small delay for the clink/clunk sequence
      setTimeout(()=> JunkAudio.SFX.clink(), 140);
      setTimeout(()=> openSection(key), 280);
    }
    setWbTarget(false);
  };

  // While ANY item is dragging, listen for pointermove on window to highlight workbench
  useEffect(()=>{
    const onMove = (e) => {
      // Only when a drag is happening — detect via .dragging element existing
      const drag = document.querySelector('.item.dragging');
      if(!drag){ setWbTarget(false); return; }
      const wb = workbenchRef.current;
      if(!wb) return;
      const r = wb.getBoundingClientRect();
      const hit = e.clientX >= r.left && e.clientX <= r.right
                  && e.clientY >= r.top && e.clientY <= r.bottom + 30;
      setWbTarget(hit);
    };
    window.addEventListener('pointermove', onMove);
    return () => window.removeEventListener('pointermove', onMove);
  }, []);

  const catchBee = () => {
    setBeeFound(true);
    JunkAudio.SFX.buzz();
    setToast({ msg: "Easter egg found 🐝", sub: "Ask Patrik about Agent Swarm Intelligence" });
    setTimeout(()=> setToast(null), 4500);
  };

  return (
    <div id="stage-wrap" onClick={startAudio}>
      <div
        id="stage"
        ref={stageRef}
        className={t.lighting === 'dusk' ? 'dusk' : ''}
        data-screen-label="Junkyard scene"
        style={{ transform: `translate(-50%,-50%) scale(${scale})` }}
      >
        {/* Painted background */}
        <div
          id="stage-bg"
          className={t.lighting === 'dusk' ? 'dusk-tint' : ''}
          style={{ backgroundImage: `url(${window.PATRIK_BG || 'assets/scrap.jpeg'})` }}
        />

        {/* Watercolor edge filter (used by selected overlays) */}
        <svg width="0" height="0" style={{ position: 'absolute', pointerEvents: 'none' }}>
          <filter id="wc-edge">
            <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" />
            <feDisplacementMap in="SourceGraphic" scale="3" />
          </filter>
        </svg>

        {/* Patrik's character (overlaid near the barn) */}
        <Character talking={characterTalking && !intro} />
        <CatBuddy onPet={() => JunkAudio.SFX.buzz()} />

        {/* Draggable items overlaid on the painting */}
        {sectionList.map((key, i) => (
          <DraggableItem
            key={key}
            section={SECTIONS[key]}
            layout={layout[key]}
            examined={examined.has(key)}
            stageRef={stageRef}
            wobbleSeed={i}
            onHover={handleHover}
            onPick={handlePick}
            onClick={openSection}
            onDrop={handleDrop}
          />
        ))}
        <Bee x={layout.bee.x} y={layout.bee.y} found={beeFound} onCatch={catchBee} />

        {/* Workbench (drop target) */}
        <div ref={workbenchRef} className={`workbench${wbTarget ? ' target' : ''}`}>
          <div className="workbench-label">Inspection Tray</div>
          <div className="workbench-hint">↳ drop a part here to inspect it</div>
          <div className="wb-tools">
            <div className="wb-lamp wb-tool">
              <div className="wb-lamp-base" />
              <div className="wb-lamp-neck" />
              <div className="wb-lamp-shade" />
              <div className="wb-lamp-bulb" />
            </div>
            <div className="wb-tool wb-screwdriver" />
            <div className="wb-tool wb-notepad" />
          </div>
          <div className="wb-lamp-glow" />
        </div>

        {/* HUD */}
        <div className="hud">
          <div className="title">
            Patrik's Junkyard
            <small>An interactive résumé</small>
          </div>
          <div className="counter">
            <span className="counter-label">{examined.size}/{sectionList.length}</span>
            <div className="counter-pips">
              {sectionList.map(k => (
                <div key={k} className={`pip${examined.has(k) ? ' on' : ''}`} title={SECTIONS[k].label} />
              ))}
            </div>
          </div>
        </div>

        <div className="toolbar">
          <button
            className="icon-btn"
            title={t.muted ? "Unmute" : "Mute"}
            onClick={() => {
              const m = !t.muted;
              setTweak('muted', m);
              if(!m){ JunkAudio.resume(); JunkAudio.startAmbient(); }
            }}
          >{t.muted ? '🔇' : '🔊'}</button>
        </div>

        {/* Intro card */}
        {intro && (
          <div className="intro">
            <h2>Welcome to the junkyard</h2>
            <p>
              I'm Patrik — Data Scientist, tinkerer, occasional canyoner.<br/>
              Each piece of electronic scrap is a part of my résumé.<br/>
              <b>Drag a part to the workbench</b> to inspect it, or just <b>click</b> to open.
            </p>
            <button onClick={() => { setIntro(false); startAudio(); }}>
              Start poking around →
            </button>
          </div>
        )}

        {toast && <Toast message={toast.msg} sub={toast.sub} show={!!toast} />}
        <Inspector section={activeSection} onClose={closeSection} />

        {/* Tweaks panel */}
        <TweaksPanel title="Tweaks">
          <TweakSection label="Scene" />
          <TweakSelect
            label="Item layout"
            value={t.layout}
            options={[
              { value:'classic',   label:'Classic pile' },
              { value:'scattered', label:'Scattered' },
              { value:'stacked',   label:'Stacked tower' },
              { value:'workshop',  label:'Workshop row' }
            ]}
            onChange={(v)=> setTweak('layout', v)}
          />
          <TweakRadio
            label="Lighting"
            value={t.lighting}
            options={['day','dusk']}
            onChange={(v)=> setTweak('lighting', v)}
          />
          <TweakSection label="Sound" />
          <TweakSlider
            label="Volume" value={t.volume} min={0} max={100} unit="%"
            onChange={(v)=> setTweak('volume', v)}
          />
          <TweakToggle
            label="Muted" value={t.muted}
            onChange={(v)=> setTweak('muted', v)}
          />
          <TweakSection label="Progress" />
          <TweakButton onClick={()=> {
            setExamined(new Set());
            setBeeFound(false);
            setActiveSection(null);
          }}>Reset exploration</TweakButton>
        </TweaksPanel>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body></html>
